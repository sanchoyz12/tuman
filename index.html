<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Затуманилось: Лабиринт Смыслов</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root {
            --bg-color: #05070a;
            --accent-color: #8b949e;
            --text-color: #f0f6fc;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --fog-color: rgba(255, 255, 255, 0.05);
            --gold-accent: #d4af37;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        #fog-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0.1;
            filter: blur(1px);
            animation: float 20s infinite linear;
            will-change: transform;
        }

        @keyframes float {
            0% {
                transform: translate3d(0, 0, 0);
            }

            50% {
                transform: translate3d(50px, -100px, 0);
            }

            100% {
                transform: translate3d(0, 0, 0);
            }
        }

        main {
            position: relative;
            z-index: 10;
            width: 95%;
            max-width: 850px;
            text-align: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 1rem 0;
        }

        .header {
            margin-bottom: min(5vh, 2rem);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 2s ease forwards;
            flex-shrink: 0;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 8vw, 4rem);
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 0.3rem;
            background: linear-gradient(180deg, #fff 30%, #484f58 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            font-size: clamp(0.6rem, 2.5vw, 0.85rem);
            color: var(--accent-color);
            font-style: italic;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #game-container {
            position: relative;
            min-height: 400px;
            height: auto;
            max-height: 75vh;
            padding: clamp(1.2rem, 6vw, 3rem);
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            width: 100%;
        }

        #game-container::-webkit-scrollbar {
            display: none;
        }

        .content-reveal {
            opacity: 0;
            transform: translate3d(0, 5px, 0);
            transition: opacity 1.2s ease, transform 0.8s ease;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .content-reveal.visible {
            opacity: 1;
            transform: translate3d(0, 0, 0);
        }

        .text-content {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1rem, 4vw, 1.4rem);
            line-height: 1.5;
            margin-bottom: 1.5rem;
            font-weight: 400;
            color: #d1d5da;
            text-align: left;
            position: relative;
        }

        .choices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            width: 100%;
        }

        .btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            color: #8b949e;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: clamp(0.7rem, 3vw, 0.85rem);
            transition: all 0.3s ease;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
        }

        .btn:hover,
        .btn:active {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        #fog-overlay {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            z-index: 100;
            cursor: crosshair;
            transition: opacity 1.2s ease;
            touch-action: none;
        }

        .instruction {
            margin-top: 1rem;
            font-size: 0.65rem;
            color: var(--accent-color);
            opacity: 0.4;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .stats {
            position: fixed;
            top: env(safe-area-inset-top, 1rem);
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            z-index: 100;
            padding: 0.5rem 1rem;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.5);
            padding: 0.35rem 0.7rem;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .stat-item span {
            color: #fff;
            font-weight: 600;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .choices {
                grid-template-columns: 1fr;
            }

            main {
                justify-content: flex-start;
                padding-top: 4rem;
            }

            #game-container {
                padding: 1.25rem;
                min-height: 450px;
            }

            .header {
                margin-bottom: 1rem;
            }
        }

        .sound-toggle {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .sound-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.1);
        }

        .sound-toggle svg {
            width: 20px;
            height: 20px;
            fill: var(--accent-color);
        }
    </style>
</head>

<body>
    <canvas id="bg-canvas"></canvas>
    <canvas id="fog-canvas"></canvas>
    <div id="particles" class="particles"></div>
    <audio id="bg-audio" src="13963.mp3" loop preload="auto" playsinline webkit-playsinline></audio>

    <div class="stats">
        <div class="stat-item">Экспертность: <span id="stat-dushnost">0</span>%</div>
        <div class="stat-item">Вдохновение: <span id="stat-subjectivity">0</span>%</div>
    </div>

    <main>
        <div class="header">
            <h1>Затуманилось</h1>
            <p class="subtitle">Путешествие в мир возможностей Вики Тумановой</p>
        </div>

        <div id="game-container">
            <canvas id="fog-overlay"></canvas>

            <div id="screen-content" class="content-reveal">
                <div class="text-content" id="main-text">
                    Мир — это лабиринт возможностей. Вика говорит: «Иногда всё, что нужно — это просто открыть закрытую
                    дверь». Готовы ли вы начать свой путь к свету сквозь туман?
                </div>
                <div class="choices" id="choice-buttons"></div>
            </div>

            <div class="instruction" id="footer-instruction">Развейте туман, чтобы увидеть скрытое</div>
        </div>
    </main>

    <div id="sound-toggle" class="sound-toggle" title="Toggle Sound">
        <svg id="sound-icon" viewBox="0 0 24 24">
            <path
                d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4-.9 7-4.6 7-8.77s-3-7.87-7-8.77zM3 9v6h4l5 5V4L7 9H3z" />
        </svg>
    </div>

    <script>
        const canvas = document.getElementById('fog-canvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('fog-overlay');
        const overlayCtx = overlay.getContext('2d');
        const gameContainer = document.getElementById('game-container');
        const screenContent = document.getElementById('screen-content');
        const mainText = document.getElementById('main-text');
        const choiceButtons = document.getElementById('choice-buttons');
        const instruction = document.getElementById('footer-instruction');
        const particlesContainer = document.getElementById('particles');
        const soundToggle = document.getElementById('sound-toggle');
        const soundIcon = document.getElementById('sound-icon');

        let dushnost = 0;
        let subjectivity = 0;
        let dpr = window.devicePixelRatio || 1;

        function scaleCanvas(c, context, width, height) {
            const dpr = window.devicePixelRatio || 1;
            c.width = Math.floor(width * dpr);
            c.height = Math.floor(height * dpr);
            context.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function triggerHaptic(type) {
            if (!navigator.vibrate) return;
            switch (type) {
                case 'light': navigator.vibrate(10); break;
                case 'medium': navigator.vibrate(30); break;
                case 'success': navigator.vibrate([10, 30, 10]); break;
                case 'tick': navigator.vibrate(5); break;
            }
        }

        function initParticles() {
            particlesContainer.innerHTML = '';
            const count = window.innerWidth < 600 ? 25 : 50;
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 2 + 1;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 15 + 10) + 's';
                p.style.animationDelay = (Math.random() * 5) + 's';
                particlesContainer.appendChild(p);
            }
        }

        // --- Background Music Controller ---
        class AmbientAudio {
            constructor() {
                this.audio = document.getElementById('bg-audio');
                this.isPlaying = false;
            }

            updateIcon() {
                if (this.isPlaying) {
                    soundIcon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4-.9 7-4.6 7-8.77s-3-7.87-7-8.77z"/>';
                } else {
                    soundIcon.innerHTML = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4-.9 7-4.6 7-8.77s-3-7.87-7-8.77zM3 9v6h4l5 5V4L7 9H3z"/>';
                }
            }

            play() {
                if (this.isPlaying) return;
                this.audio.volume = 0.4;
                this.audio.play().then(() => {
                    this.isPlaying = true;
                    this.updateIcon();
                }).catch(e => console.log("Play blocked", e));
            }

            pause() {
                this.audio.pause();
                this.isPlaying = false;
                this.updateIcon();
            }

            toggle() {
                if (this.isPlaying) this.pause();
                else this.play();
            }
        }

        const ambient = new AmbientAudio();
        soundToggle.onclick = () => ambient.toggle();

        let fogParticles = [];
        function initBackgroundFog() {
            scaleCanvas(canvas, ctx, window.innerWidth, window.innerHeight);
            fogParticles = [];
            const count = window.innerWidth < 600 ? 15 : 25;
            for (let i = 0; i < count; i++) {
                fogParticles.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    radius: Math.random() * 300 + 150,
                    dx: (Math.random() - 0.5) * 0.3,
                    dy: (Math.random() - 0.5) * 0.3,
                    alpha: Math.random() * 0.15
                });
            }
        }

        // --- WebGL Background Shader ---
        let bgScene, bgCamera, bgRenderer, bgMesh, bgMaterial;
        function initBgShader() {
            const bgCanvas = document.getElementById('bg-canvas');
            bgRenderer = new THREE.WebGLRenderer({ canvas: bgCanvas, antialias: true });
            bgRenderer.setPixelRatio(window.devicePixelRatio);
            bgRenderer.setSize(window.innerWidth, window.innerHeight);

            bgScene = new THREE.Scene();
            bgCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

            const vertexShader = `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                uniform float time;
                uniform vec2 resolution;
                varying vec2 vUv;

                // Simple simplex-like noise
                vec3 permute(vec3 x) { return mod(((x*34.0)+1.0)*x, 289.0); }
                float snoise(vec2 v){
                    const vec4 C = vec4(0.211324865405187, 0.366025403784439,
                            -0.577350269189626, 0.024390243902439);
                    vec2 i  = floor(v + dot(v, C.yy) );
                    vec2 x0 = v -   i + dot(i, C.xx);
                    vec2 i1;
                    i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
                    vec4 x12 = x0.xyxy + C.xxzz;
                    x12.xy -= i1;
                    i = mod(i, 289.0);
                    vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 ))
                        + i.x + vec3(0.0, i1.x, 1.0 ));
                    vec3 m = max(0.5 - vec4(dot(x0,x0), dot(x12.xy,x12.xy),
                        dot(x12.zw,x12.zw), 0.0), 0.0);
                    m = m*m ;
                    m = m*m ;
                    vec3 x = 2.0 * fract(p * C.www) - 1.0;
                    vec3 h = abs(x) - 0.5;
                    vec3 ox = floor(x + 0.5);
                    vec3 a0 = x - ox;
                    m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
                    vec3 g;
                    g.x  = a0.x  * x0.x  + h.x  * x0.y;
                    g.yz = a0.yz * x12.xz + h.yz * x12.yw;
                    return 130.0 * dot(m, g);
                }

                void main() {
                    vec2 uv = vUv;
                    float n = snoise(uv * 2.0 + time * 0.1);
                    float n2 = snoise(uv * 4.0 - time * 0.05);
                    
                    vec3 color1 = vec3(0.02, 0.04, 0.1); // Deep Navy
                    vec3 color2 = vec3(0.0, 0.82, 1.0) * 0.2; // Dim Cyan
                    vec3 color3 = vec3(0.5, 0.0, 0.8) * 0.1; // Deep Purple

                    vec3 finalColor = mix(color1, color2, n * 0.5 + 0.5);
                    finalColor = mix(finalColor, color3, n2 * 0.3 + 0.3);
                    
                    // Add subtle vignette
                    float dist = distance(uv, vec2(0.5));
                    finalColor *= 1.0 - dist * 0.5;

                    gl_FragColor = vec4(finalColor, 1.0);
                }
            `;

            bgMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
                },
                vertexShader,
                fragmentShader
            });

            const geometry = new THREE.PlaneGeometry(2, 2);
            bgMesh = new THREE.Mesh(geometry, bgMaterial);
            bgScene.add(bgMesh);
        }

        // Combined animation loop for WebGL background and 2D fog particles
        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now() * 0.001;

            // WebGL Background Shader animation
            if (bgMaterial) bgMaterial.uniforms.time.value = time;
            if (bgRenderer) bgRenderer.render(bgScene, bgCamera);

            // Existing 2D fog particles logic (from original animateFog)
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            fogParticles.forEach(p => {
                p.x += p.dx; p.y += p.dy;
                if (p.x < -p.radius) p.x = window.innerWidth + p.radius;
                if (p.x > window.innerWidth + p.radius) p.x = -p.radius;
                if (p.y < -p.radius) p.y = canvas.height + p.radius;
                if (p.y > canvas.height + p.radius) p.y = -p.radius;

                const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius);
                grad.addColorStop(0, `rgba(200, 210, 255, ${p.alpha})`);
                grad.addColorStop(1, 'rgba(200, 210, 255, 0)');
                ctx.fillStyle = grad;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
            });
        }

        function initOverlayFog() {
            const rect = gameContainer.getBoundingClientRect();
            scaleCanvas(overlay, overlayCtx, rect.width, rect.height);
            overlayCtx.globalCompositeOperation = 'source-over';
            overlayCtx.fillStyle = '#05070a';
            overlayCtx.fillRect(0, 0, rect.width, rect.height);

            for (let i = 0; i < 800; i++) {
                overlayCtx.fillStyle = `rgba(255,255,255,${Math.random() * 0.015})`;
                overlayCtx.beginPath();
                overlayCtx.arc(Math.random() * rect.width, Math.random() * rect.height, Math.random() * 25, 0, Math.PI * 2);
                overlayCtx.fill();
            }

            overlayCtx.fillStyle = "rgba(255,255,255,0.4)";
            const isMobile = window.innerWidth < 600;
            overlayCtx.font = `italic ${isMobile ? '18px' : '26px'} 'Playfair Display'`;
            overlayCtx.textAlign = "center";

            overlay.style.display = 'block';
            overlay.style.opacity = '1';
            instruction.style.opacity = '0.4';

            if (isMobile) {
                overlayCtx.fillText("Развейте туман", rect.width / 2, rect.height / 2 - 10);
                overlayCtx.fillText("для продолжения...", rect.width / 2, rect.height / 2 + 15);
            } else {
                overlayCtx.fillText("Развейте туман для продолжения...", rect.width / 2, rect.height / 2);
            }
            overlayCtx.globalCompositeOperation = 'destination-out';
        }

        let isDrawing = false;
        function draw(e) {
            if (!isDrawing) return;
            const r = overlay.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const x = clientX - r.left;
            const y = clientY - r.top;
            const radius = window.innerWidth < 600 ? 80 : 120;
            const grad = overlayCtx.createRadialGradient(x, y, 0, x, y, radius);
            grad.addColorStop(0, 'rgba(0,0,0,1)');
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            overlayCtx.fillStyle = grad;
            overlayCtx.beginPath();
            overlayCtx.arc(x, y, radius, 0, Math.PI * 2);
            overlayCtx.fill();
            triggerHaptic('tick');
            checkClearance();
        }

        function checkClearance() {
            const rect = overlay.getBoundingClientRect();
            const imageData = overlayCtx.getImageData(0, 0, rect.width * dpr, rect.height * dpr);
            const pixels = imageData.data;
            let transparent = 0;
            for (let i = 3; i < pixels.length; i += 100) {
                if (pixels[i] === 0) transparent++;
            }
            const cleared = (transparent / (pixels.length / 100)) * 100;
            if (cleared > 5) screenContent.classList.add('visible');
            if (cleared > 25) {
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    instruction.style.opacity = '0';
                }, 800);
            }
        }

        overlay.addEventListener('mousedown', () => {
            isDrawing = true;
            ambient.play();
        });
        window.addEventListener('mouseup', () => isDrawing = false);
        overlay.addEventListener('mousemove', draw);
        overlay.addEventListener('touchstart', (e) => {
            isDrawing = true;
            ambient.play();
            draw(e);
            if (e.cancelable) e.preventDefault();
        }, { passive: false });
        overlay.addEventListener('touchend', () => isDrawing = false);
        overlay.addEventListener('touchmove', (e) => { draw(e); e.preventDefault(); }, { passive: false });

        const storySegments = {
            start: {
                text: "Привет! Я — Вика Туманова. Пиарщик, трудоголик, путешественник. Моя жизнь — это лабиринт смыслов, где каждое событие — это либо лимон, из которого нужно сделать джус, либо маяк, указывающий путь. С чего начнём наше восхождение?",
                choices: [
                    { text: "PR & Лидерство: Создать идеальную команду", next: "pr_1", d: 10, s: 0 },

                text: "Вы на заседании Госсовета. Манифест 'Служение и Порядок' готов. Вика шепчет: «Наше дело благое. Победа будет за нами». Какое финальное требование вы впишете в кодекс будущего?",
                choices: [
                    { text: "Безоговорочное служение государству", next: "final_climb", d: 30, s: -20 },
                    { text: "Служение через профессионализм и этику", next: "final_climb", d: 15, s: 15 }
                ]
            },

            // --- PATH: SPIRIT/CREATIVE (4 Nodes + Expansion) ---
            act2_spirit_1: {
                text: "Вы стоите на крыше питерской многоэтажки. Внизу — огни, вверху — тишина. Вика: «Смысл в том, чтобы не искать смысл, а чувствовать его кожей». В наушниках играет инди-рок. Что вы ищете в этом моменте?",
                choices: [

                choices: [
                    { text: "Нарисовать хаос и свободу", next: "mid_spirit", d: -15, s: 20 },

            },
            mid_spirit: {
                text: "Середина пути по облакам. Вы чувствуете невероятную свободу, но мир вокруг кажется всё менее реальным. Как вернемся на землю?",
                choices: [
                    { text: "Через любовь к конкретным людям", next: "act2_spirit_3", d: 0, s: 20 },
                    { text: "Через горькую иронию и сарказм", next: "act2_spirit_3", d: 10, s: 10 }
                ]
            },
            act2_spirit_3: {
                resetFog: true,
                text: "Мерцание звезд на фоне Балтийского моря. Вика шепчет: «Красота спасет мир, если мир захочет спастись». Как вы зафиксируете это состояние духа?",

            // --- PATH: BALANCE/MASTER (4 Nodes + Expansion) ---
            act2_balance_1: {

                choices: [
                    { text: "Через дисциплину творчества", next: "act2_balance_2", d: 10, s: 10 },
                    { text: "Через творческий подход к дисциплине", next: "act2_balance_2", d: 10, s: 10 }
                ]
            },
            act2_balance_2: {
                resetFog: true,
                text: "Ситуация требует и четкого протокола, и эмпатии. Вика: «Будь адекватным, но не теряй лицо». Как вы разрешите конфликт сторон?",
                choices: [
                    { text: "Найти рациональный компромисс", next: "mid_balance", d: 15, s: 5 },

            mid_balance: {

                    { text: "Я — мост между ними (Баланс)", next: "act2_balance_3", d: 10, s: 10 },

                ]
            },
            act2_balance_3: {

                text: "Последний перевал. Вика: «Самое сложное — не победить, а остаться собой в моменте победы». Как вы подведете итог своего пути?",
                choices: [
                    { text: "Честность перед собой — это база", next: "final_climb", d: 15, s: 15 },
                    { text: "Служение истине превыше всего", next: "final_climb", d: 10, s: 20 }
                ]
            },

            // --- PATH: CHAOS/GHOST (4 Nodes + Expansion) ---
            act2_chaos_1: {
                text: "Вы бросили всё. Телефон в море, галстук — в урну. Вы в Омске, ищете следы Летова или в Калининграде на заброшенном маяке. Вика: «Иногда нужно всё разрушить, чтобы увидеть истинное». Что вы видите в этой пустоте?",
                choices: [
                    { text: "Абсолютный покой и тишину", next: "act2_chaos_2", d: -15, s: -15 },
                    { text: "Веселый карнавал случайностей", next: "act2_chaos_2", d: 5, s: 10 }
                ]
            },
            act2_chaos_2: {
                resetFog: true,
                text: "Мир вокруг начинает 'глитчить'. Социальные роли стираются. Вика: «В этом хаосе больше правды, чем в любом отчете». Вам предлагают вернуться в систему на ваших условиях. Примете?",
                choices: [
                    { text: "Никаких условий. Только свобода", next: "mid_chaos", d: -20, s: -20 },
                    { text: "Вернусь как 'Агент Хаоса' внутри", next: "mid_chaos", d: 10, s: 5 }
                ]
            },
            mid_chaos: {
                text: "Точка невозврата. Вы — призрак в системе. Вас никто не видит, но вы видите всех. Как распорядитесь этой анонимностью?",
                choices: [
                    { text: "Стану созерцателем (Тень)", next: "act2_chaos_3", d: -10, s: -10 },
                    { text: "Стану трикстером (Игра)", next: "act2_chaos_3", d: 5, s: 15 }
                ]
            },
            act2_chaos_3: {
                resetFog: true,
                text: "Последний заброшенный маяк. Вика шепчет: «Туман — это твой новый дом. Здесь нет правил, есть только ты». Ваш последний жест перед финалом?",
                choices: [
                    { text: "Уйти в полную невидимость", next: "final_climb", d: -30, s: -30 },
                    { text: "Скинуть прощальный мем", next: "final_climb", d: 5, s: 5 }
                ]
            },

            final_climb: {
                text: "Облака рассеиваются. Последние шаги по склону Машука (или по палубе коча). Вика Туманова улыбается вам: 'Вы прошли этот лабиринт. Помните: жизнь — это не только пиар или маршруты, это вы сами в каждом моменте'. Кем вы выходите из этого тумана?",
                choices: [
                    { text: "Узнать свою истинную роль", next: "calculate_ending", d: 0, s: 0 }
                ]
            },

            // --- 6 Distinct Endings ---
            end_nerd: {
                text: "ФИНАЛ: ГОСУДАРСТВЕННЫЙ СТРАТЕГ. Ваша экспертность зашкаливает. Вы — мозг 'Знания', архитектор PR-кампаний федерального масштаба. Ваш девиз: 'Адекватность и скорость'. Вы ведете составы судеб по четким маршрутам к великой цели. Вика: 'На таких, как вы, держится страна! Жму руку'.",
                choices: [{ text: "Начать новый цикл свершений", next: "start", d: 0, s: 0 }]
            },
            end_artist: {
                text: "ФИНАЛ: ВДОХНОВИТЕЛЬ ЦИФРОВОЙ ЭПОХИ. Ваше сердце полно любви, а голова — метафор Пелевина. Вы превращаете лимоны в джус, а серые будни — в магический трип. Для вас жизнь — это музыка и свет маяка. Вика: 'Вы сделали этот мир шире и ярче. Спасибо за полет!'.",
                choices: [{ text: "Увидеть новый счастливый сон", next: "start", d: 0, s: 0 }]
            },
            end_master: {
                text: "ФИНАЛ: МАСТЕР МЕРИДИАНОВ. Вы нашли идеальный баланс. Вы — адекватный пиарщик с душой поэта. Умеете и протокол составить, и икону в горах найти. Вы открыли все закрытые двери и научились жить настоящим. Вика: 'Вы — мой лучший бадди и соратник. Вместе мы — сила!'.",
                choices: [{ text: "Продолжить путь к истине", next: "start", d: 0, s: 0 }]
            },
            end_ghost: {
                text: "ФИНАЛ: ЧЕЛОВЕК-ТЕНЬ. Вы предпочли остаться в тени, фиксируя мир в моменте. Как фотограф Омской обороны, вы знаете больше всех, но молчите. Ваш путь — созерцание и поиск «неслучайных случайностей». Вика: 'Иногда тишина громче слов. Ваша глубина поражает и заставляет задуматься'.",
                choices: [{ text: "Обрести новую форму", next: "start", d: 0, s: 0 }]
            },
            end_north: {
                text: "ФИНАЛ: ХРАНИТЕЛЬ МАЯКА. Вы вернулись к истокам. Северные вёсла, мудрость отца и честные поступки — вот ваш компас. Вы нашли покой в простой правде жизни, вдали от шума медиа. Вика: 'Здесь, на краю земли, начинается настоящий смысл. Будь счастлив, батя бы тобой гордился'.",
                choices: [{ text: "Вернуться к людям со светом", next: "start", d: 0, s: 0 }]
            },
            end_chaos: {
                text: "ФИНАЛ: АГЕНТ ХОРОШЕГО ХАОСА. Вы нарушили все правила и победили. Ваш мир — это калейдоскоп из 40 книг, смешных заголовков и любви к животным. Вы смеетесь в лицо кризисам и дедлайнам. Вика смеется вместе с вами: 'Всё будет хорошо, я привыкла к таким вищам! В этом хаосе есть жизнь'.",
                choices: [{ text: "Устроить новый весёлый хаос", next: "start", d: 0, s: 0 }]
            }
        };

        function renderSegment(id) {
            if (id === 'act2_eval_redirect') {
                const diff = dushnost - subjectivity;
                if (diff > 15) id = 'act2_intro_system';
                else if (diff < -15) id = 'act2_intro_creative';
                else id = 'act2_intro_balance';
            }

            if (id === 'calculate_ending') {
                const diff = dushnost - subjectivity; // + if D heavy, - if S heavy
                const sum = dushnost + subjectivity;

                // Sector Dominance Logic
                if (sum >= 140 && Math.abs(diff) <= 30) {
                    id = 'end_master'; // High Balanced: Master
                } else if (sum <= 65) {
                    id = 'end_ghost'; // Low Balanced: Ghost
                } else if (diff >= 45) {
                    id = 'end_nerd'; // Pure Dushnost: Strategist
                } else if (diff <= -45) {
                    id = 'end_artist'; // Pure Subjectivity: Artist
                } else if (dushnost > subjectivity && dushnost >= 70) {
                    id = 'end_north'; // Mixed D-Heavy: North Seeker
                } else {
                    id = 'end_chaos'; // Default / Hybrid: Agent of Chaos
                }
            }

            const segment = storySegments[id];

            screenContent.style.opacity = '0';
            screenContent.style.transform = 'translate3d(0, 20px, 0)';

            setTimeout(() => {
                triggerHaptic('medium');
                mainText.innerText = segment.text;
                choiceButtons.innerHTML = '';
                segment.choices.forEach(c => {
                    const btn = document.createElement('button');
                    btn.className = 'btn';
                    btn.innerText = c.text;
                    btn.onclick = () => {
                        triggerHaptic('light');
                        if (id.startsWith('end_') && c.next === 'start') { dushnost = 0; subjectivity = 0; }
                        else {
                            const prevSum = dushnost + subjectivity;
                            dushnost = Math.min(100, Math.max(0, dushnost + (c.d || 0)));
                            subjectivity = Math.min(100, Math.max(0, subjectivity + (c.s || 0)));
                            if (Math.abs((dushnost + subjectivity) - prevSum) >= 20) triggerHaptic('success');
                        }
                        updateStats(); renderSegment(c.next);
                    };
                    choiceButtons.appendChild(btn);
                });
                screenContent.style.opacity = '1';
                screenContent.style.transform = 'translate3d(0, 0, 0)';
            }, 800);
        }

        function updateStats() {
            document.getElementById('stat-dushnost').innerText = dushnost;
            document.getElementById('stat-subjectivity').innerText = subjectivity;
        }

        window.onload = () => {
            renderSegment('start');
            initParticles();
            initBackgroundFog();
            initBgShader();
            animate();
            initOverlayFog();
        };

        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                initBackgroundFog();
                if (bgRenderer) {
                    bgRenderer.setSize(window.innerWidth, window.innerHeight);
                    bgMaterial.uniforms.resolution.value.set(window.innerWidth, window.innerHeight);
                }
                if (overlay.style.display !== 'none') initOverlayFog();
            }, 250);
        });
    </script>
</body>
