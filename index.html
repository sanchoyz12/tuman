<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Затуманилось: Лабиринт Смыслов</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #05070a;
            --accent-color: #8b949e;
            --text-color: #f0f6fc;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --fog-color: rgba(255, 255, 255, 0.05);
            --gold-accent: #d4af37;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #05070a;
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            background-attachment: fixed;
        }

        #fog-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0.1;
            filter: blur(1px);
            animation: float 20s infinite linear;
            will-change: transform;
        }

        @keyframes float {
            0% {
                transform: translate3d(0, 0, 0);
            }

            50% {
                transform: translate3d(50px, -100px, 0);
            }

            100% {
                transform: translate3d(0, 0, 0);
            }
        }

        main {
            position: relative;
            z-index: 10;
            width: 95%;
            max-width: 850px;
            text-align: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 1rem 0;
        }

        .header {
            margin-bottom: min(5vh, 2rem);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 2s ease forwards;
            flex-shrink: 0;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 8vw, 4rem);
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 0.3rem;
            background: linear-gradient(180deg, #fff 30%, #484f58 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            font-size: clamp(0.6rem, 2.5vw, 0.85rem);
            color: var(--accent-color);
            font-style: italic;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #game-container {
            position: relative;
            min-height: 400px;
            height: auto;
            max-height: 75vh;
            padding: clamp(1.2rem, 6vw, 3rem);
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            width: 100%;
        }

        #game-container::-webkit-scrollbar {
            display: none;
        }

        .content-reveal {
            opacity: 0;
            transform: translate3d(0, 5px, 0);
            transition: opacity 1.2s ease, transform 0.8s ease;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .content-reveal.visible {
            opacity: 1;
            transform: translate3d(0, 0, 0);
        }

        .text-content {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1rem, 4vw, 1.4rem);
            line-height: 1.5;
            margin-bottom: 1.5rem;
            font-weight: 400;
            color: #d1d5da;
            text-align: left;
            position: relative;
        }

        .choices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            width: 100%;
        }

        .btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            color: #8b949e;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: clamp(0.7rem, 3vw, 0.85rem);
            transition: all 0.3s ease;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
        }

        .btn:hover,
        .btn:active {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        #fog-overlay {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            z-index: 100;
            cursor: crosshair;
            transition: opacity 1.2s ease;
            touch-action: none;
        }

        .instruction {
            margin-top: 1rem;
            font-size: 0.65rem;
            color: var(--accent-color);
            opacity: 0.4;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .stats {
            position: fixed;
            top: env(safe-area-inset-top, 1rem);
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            z-index: 100;
            padding: 0.5rem 1rem;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.5);
            padding: 0.35rem 0.7rem;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .stat-item span {
            color: #fff;
            font-weight: 600;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .choices {
                grid-template-columns: 1fr;
            }

            main {
                justify-content: flex-start;
                padding-top: 4rem;
            }

            #game-container {
                padding: 1.25rem;
                min-height: 450px;
            }

            .header {
                margin-bottom: 1rem;
            }
        }
    </style>
</head>

<body>
    <canvas id="fog-canvas"></canvas>
    <div id="particles" class="particles"></div>

    <div class="stats">
        <div class="stat-item">Экспертность: <span id="stat-dushnost">0</span>%</div>
        <div class="stat-item">Вдохновение: <span id="stat-subjectivity">0</span>%</div>
    </div>

    <main>
        <div class="header">
            <h1>Затуманилось</h1>
            <p class="subtitle">Путешествие в мир возможностей Вики Тумановой</p>
        </div>

        <div id="game-container">
            <canvas id="fog-overlay"></canvas>

            <div id="screen-content" class="content-reveal">
                <div class="text-content" id="main-text">
                    Мир — это лабиринт возможностей. Вика говорит: «Иногда всё, что нужно — это просто открыть закрытую
                    дверь». Готовы ли вы начать свой путь к свету сквозь туман?
                </div>
                <div class="choices" id="choice-buttons"></div>
            </div>

            <div class="instruction" id="footer-instruction">Развейте туман, чтобы увидеть скрытое</div>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('fog-canvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('fog-overlay');
        const overlayCtx = overlay.getContext('2d');
        const gameContainer = document.getElementById('game-container');
        const screenContent = document.getElementById('screen-content');
        const mainText = document.getElementById('main-text');
        const choiceButtons = document.getElementById('choice-buttons');
        const instruction = document.getElementById('footer-instruction');
        const particlesContainer = document.getElementById('particles');

        let dushnost = 0;
        let subjectivity = 0;
        let dpr = window.devicePixelRatio || 1;

        function scaleCanvas(c, context, width, height) {
            const dpr = window.devicePixelRatio || 1;
            c.width = Math.floor(width * dpr);
            c.height = Math.floor(height * dpr);
            context.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function initParticles() {
            particlesContainer.innerHTML = '';
            const count = window.innerWidth < 600 ? 25 : 50;
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 2 + 1;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 15 + 10) + 's';
                p.style.animationDelay = (Math.random() * 5) + 's';
                particlesContainer.appendChild(p);
            }
        }

        let fogParticles = [];
        function initBackgroundFog() {
            scaleCanvas(canvas, ctx, window.innerWidth, window.innerHeight);
            fogParticles = [];
            const count = window.innerWidth < 600 ? 15 : 25;
            for (let i = 0; i < count; i++) {
                fogParticles.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    radius: Math.random() * 300 + 150,
                    dx: (Math.random() - 0.5) * 0.3,
                    dy: (Math.random() - 0.5) * 0.3,
                    alpha: Math.random() * 0.15
                });
            }
        }

        function animateFog() {
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            fogParticles.forEach(p => {
                p.x += p.dx; p.y += p.dy;
                if (p.x < -p.radius) p.x = window.innerWidth + p.radius;
                if (p.x > window.innerWidth + p.radius) p.x = -p.radius;
                if (p.y < -p.radius) p.y = canvas.height + p.radius;
                if (p.y > canvas.height + p.radius) p.y = -p.radius;

                const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius);
                grad.addColorStop(0, `rgba(200, 210, 255, ${p.alpha})`);
                grad.addColorStop(1, 'rgba(200, 210, 255, 0)');
                ctx.fillStyle = grad;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
            });
            requestAnimationFrame(animateFog);
        }

        function initOverlayFog() {
            const rect = gameContainer.getBoundingClientRect();
            scaleCanvas(overlay, overlayCtx, rect.width, rect.height);
            overlayCtx.globalCompositeOperation = 'source-over';
            overlayCtx.fillStyle = '#05070a';
            overlayCtx.fillRect(0, 0, rect.width, rect.height);

            for (let i = 0; i < 800; i++) {
                overlayCtx.fillStyle = `rgba(255,255,255,${Math.random() * 0.015})`;
                overlayCtx.beginPath();
                overlayCtx.arc(Math.random() * rect.width, Math.random() * rect.height, Math.random() * 25, 0, Math.PI * 2);
                overlayCtx.fill();
            }

            overlayCtx.fillStyle = "rgba(255,255,255,0.4)";
            const isMobile = window.innerWidth < 600;
            overlayCtx.font = `italic ${isMobile ? '18px' : '26px'} 'Playfair Display'`;
            overlayCtx.textAlign = "center";

            overlay.style.display = 'block';
            overlay.style.opacity = '1';
            instruction.style.opacity = '0.4';

            if (isMobile) {
                overlayCtx.fillText("Развейте туман", rect.width / 2, rect.height / 2 - 10);
                overlayCtx.fillText("для продолжения...", rect.width / 2, rect.height / 2 + 15);
            } else {
                overlayCtx.fillText("Развейте туман для продолжения...", rect.width / 2, rect.height / 2);
            }
            overlayCtx.globalCompositeOperation = 'destination-out';
        }

        let isDrawing = false;
        function draw(e) {
            if (!isDrawing) return;
            const r = overlay.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const x = clientX - r.left;
            const y = clientY - r.top;
            const radius = window.innerWidth < 600 ? 80 : 120;
            const grad = overlayCtx.createRadialGradient(x, y, 0, x, y, radius);
            grad.addColorStop(0, 'rgba(0,0,0,1)');
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            overlayCtx.fillStyle = grad;
            overlayCtx.beginPath();
            overlayCtx.arc(x, y, radius, 0, Math.PI * 2);
            overlayCtx.fill();
            checkClearance();
        }

        function checkClearance() {
            const rect = overlay.getBoundingClientRect();
            const imageData = overlayCtx.getImageData(0, 0, rect.width * dpr, rect.height * dpr);
            const pixels = imageData.data;
            let transparent = 0;
            for (let i = 3; i < pixels.length; i += 100) {
                if (pixels[i] === 0) transparent++;
            }
            const cleared = (transparent / (pixels.length / 100)) * 100;
            if (cleared > 5) screenContent.classList.add('visible');
            if (cleared > 25) {
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    instruction.style.opacity = '0';
                }, 800);
            }
        }

        overlay.addEventListener('mousedown', () => isDrawing = true);
        window.addEventListener('mouseup', () => isDrawing = false);
        overlay.addEventListener('mousemove', draw);
        overlay.addEventListener('touchstart', (e) => { isDrawing = true; draw(e); }, { passive: false });
        overlay.addEventListener('touchend', () => isDrawing = false);
        overlay.addEventListener('touchmove', (e) => { draw(e); e.preventDefault(); }, { passive: false });

        const storySegments = {
            start: {
                text: "Привет! Я — Вика Туманова. Пиарщик, трудоголик, путешественник. Моя жизнь — это лабиринт смыслов, где каждое событие — это либо лимон, из которого нужно сделать джус, либо маяк, указывающий путь. С чего начнём наше восхождение?",
                choices: [
                    { text: "PR & Лидерство: Создать идеальную команду", next: "pr_1", d: 15, s: 5 },
                    { text: "Маршруты: От Балтийских дюн до Белого моря", next: "tr_1", d: 5, s: 15 },
                    { text: "Культура: Озборн, Пелевин и тайны Алисы", next: "bk_1", d: 10, s: 10 },
                    { text: "Жизненный код: Мудрость предков и сила любви", next: "ws_1", d: 0, s: 20 }
                ]
            },

            // --- PR PATH (Expanded) ---
            pr_1: {
                text: "Вы на 'Мастерской новых медиа'. Вика говорит: 'PR должен подчиняться первому лицу'. Перед вами задача — собрать команду по книге 'Шесть гениев'. Кого выберете в первую очередь?",
                choices: [
                    { text: "Креаторов и Изобретателей (Концепт)", next: "pr_2_concept", d: 10, s: 10 },
                    { text: "Настойчивых и Поддержку (Реализация)", next: "pr_2_real", d: 15, s: 5 }
                ]
            },
            pr_2_concept: {
                text: "Идеи бьют ключом, но 'надо вчера' уже наступило. Жизнь подкидывает лимоны. Что будем делать?",
                choices: [
                    { text: "Оперативно превращать их во вкусный джус", next: "pr_3", d: 5, s: 20 },
                    { text: "Вычитать чаты и согласовать релизы (Занудство)", next: "pr_3", d: 20, s: 0 }
                ]
            },
            pr_2_real: {
                text: "Команда работает как часы, но не хватает вдохновения. Вика вспоминает лекции Общества 'Знание'. Нужно привлечь аудиторию.",
                choices: [
                    { text: "Заголовок: 'Приходите поумнеть. Дуракам скидка 50%'", next: "pr_3", d: 15, s: 15 },
                    { text: "Серьёзный доклад о медиаграмотности", next: "pr_3", d: 25, s: -5 }
                ]
            },
            pr_3: {
                text: "Кризис! 'Информационная война' в разгаре. Нас внесли в санкции. Вика: 'Значит, всё делаем правильно!'. Как реагируем на фейки?",
                choices: [
                    { text: "Изучаем 'Диалог о фейках 3.0' и ищем аналог", next: "pr_4", d: 20, s: 5 },
                    { text: "Творим информационные чудеса на виражах", next: "pr_4", d: 10, s: 25 }
                ]
            },
            pr_4: {
                text: "ПМЭФ. Встреча с ИИ-Телемосту. Машина предлагает протокол. Но Вика знает: 'ИИ — это инструмент, смысл — за человеком'. Как докажем свою адекватность?",
                choices: [
                    { text: "Станем 'Бадди месяца' для новичков", next: "pr_5", d: 15, s: 15 },
                    { text: "Возглавим PR-департамент губернатора", next: "pr_5", d: 30, s: -5 }
                ]
            },
            pr_5: {
                text: "Вы на 'Знание.Наука'. Министры в зале, лекторы жгут. 'Инвестиции в науку — это база'. В чём ваша личная экспертность?",
                choices: [
                    { text: "В умении видеть социальный лифт для каждого", next: "checkpoint_1", d: 15, s: 20 },
                    { text: "В строгом соблюдении этики чиновника", next: "checkpoint_1", d: 25, s: 5 }
                ]
            },

            // --- TRAVEL PATH (Expanded) ---
            tr_1: {
                text: "Калининград. 770 лет. 'Здесь дождь — это культурный код'. Маяк в Заливино светит сквозь туман. Куда отправимся дальше?",
                choices: [
                    { text: "В Светлогорск — за тишиной и янтарем", next: "tr_2_baltic", d: 5, s: 15 },
                    { text: "В Рязань — считать грибы с глазами", next: "tr_2_ryazan", d: 10, s: 10 }
                ]
            },
            tr_2_baltic: {
                text: "Шум волн. Вика: 'Калининград — это область-трофей, но и место силы'. Вы стоите у филиала Третьяковки — 8 лет от мечты до реальности. Что чувствуете?",
                choices: [
                    { text: "Гордость за масштаб созидания", next: "tr_3", d: 15, s: 10 },
                    { text: "Меланхолию уходящей Пруссии", next: "tr_3", d: 0, s: 25 }
                ]
            },
            tr_2_ryazan: {
                text: "Рязань. Столица ВДВ и родина Есенина. Вика открывает тайну: 'Макс Фактор начинал здесь!'. Готовы ли вы найти свой грим в этой истории?",
                choices: [
                    { text: "Изучать биографию Факторовича", next: "tr_3", d: 20, s: 5 },
                    { text: "Искать вдохновение в пешеходных улочках", next: "tr_3", d: 5, s: 20 }
                ]
            },
            tr_3: {
                text: "Архангельск. Северная Двина. Вы в цеху Поморского коча. Глеб Плетнев показывает 19-метровое судно. 'Всё русское, даже движок!'. Готовы шлёп-шлёп вёслами по Белому морю?",
                choices: [
                    { text: "Стать частью команды мореходов", next: "tr_4", d: 10, s: 20 },
                    { text: "Изучать чертежи поморских судов", next: "tr_4", d: 20, s: 10 }
                ]
            },
            tr_4: {
                text: "Самара. Жигулевские горы. Вика: 'Здесь ощущение, что я дома'. Стадион, набережная, пивняк на каждом шагу. Но почему всё такое 'уставшее'?",
                choices: [
                    { text: "Нужен капремонт и взгляд стратега", next: "tr_5", d: 25, s: 5 },
                    { text: "Нужно просто любить этот мир Аленького цветочка", next: "tr_5", d: 5, s: 25 }
                ]
            },
            tr_5: {
                text: "Дальний Восток. Остров Шумшу. 3 сентября — конец войны и память о Героях. Вика: 'Никто не забыт'. Как почтить память?",
                choices: [
                    { text: "Посмотреть документальный код доступа", next: "tr_6", d: 20, s: 10 },
                    { text: "Просто молча посмотреть на океан", next: "tr_6", d: 0, s: 25 }
                ]
            },
            tr_6: {
                text: "Пятигорск. Провал и Центр 'Машук'. Вика: 'Кавказу повезло — мы начали изучать свою страну'. Гештальт закрыт, икона найдена. Готовы ли вы к последнему восхождению?",
                choices: [
                    { text: "Да, я полон сил и смыслов!", next: "checkpoint_1", d: 10, s: 30 }
                ]
            },

            // --- CULTURE PATH (Expanded) ---
            bk_1: {

            bk_2: {

                    { text: "Просто глубоко вдохнуть этот мир", next: "ws_4", d: 5, s: 25 }
                ]
            },
            ws_4: {
                text: "Омск. Родина Егора Летова. Вы нашли фотографа Обороны. Вика: 'Всё крутится на 10 лет назад'. Что вы скажете своему прошлому 'Я'?",
                choices: [

            checkpoint_1: {

            },
            end_artist: {
                text: "ФИНАЛ: ВДОХНОВИТЕЛЬ ЦИФРОВОЙ ЭПОХИ. Ваше сердце полно любви, а голова — метафор Пелевина. Вы превращаете лимоны в джус, а серые будни — в магический трип. Для вас жизнь — это музыка и свет маяка. Вика: 'Вы сделали этот мир шире и ярче'.",
                choices: [{ text: "Увидеть новый счастливый сон", next: "start", d: 0, s: 0 }]
            },
            end_master: {
                text: "ФИНАЛ: МАСТЕР МЕРИДИАНОВ. Вы нашли идеальный баланс. Вы — адекватный пиарщик с душой поэта. Умеете и протокол составить, и икону в горах найти. Вы открыли все закрытые двери и научились жить настоящим. Вика: 'Вы — мой лучший бадди и соратник'.",

                choices: [{ text: "Обрести новую форму", next: "start", d: 0, s: 0 }]
            },
            end_north: {

                choices: [{ text: "Вернуться к людям со светом", next: "start", d: 0, s: 0 }]
            },
            end_chaos: {
                text: "ФИНАЛ: АГЕНТ ХОРОШЕГО ХАОСА. Вы нарушили все правила и победили. Ваш мир — это калейдоскоп из 40 книг, смешных заголовков и любви к животным. Вы смеетесь в лицо кризисам и дедлайнам. Вика смеется вместе с вами: 'Всё будет хорошо, я привыкла к таким вещам!'",
                choices: [{ text: "Устроить новый весёлый хаос", next: "start", d: 0, s: 0 }]
            }
        };

        function renderSegment(id) {
            if (id === 'calculate_ending') {
                if (dushnost >= 85) id = 'end_nerd';
                else if (subjectivity >= 85) id = 'end_artist';
                else if (dushnost >= 45 && subjectivity >= 45) id = 'end_master';
                else if (dushnost < 30 && subjectivity < 30) id = 'end_ghost';
                else if (dushnost > 60 && subjectivity < 30) id = 'end_north';
                else id = 'end_chaos';
            }

            const segment = storySegments[id];

            screenContent.style.opacity = '0';
            screenContent.style.transform = 'translate3d(0, 20px, 0)';

            setTimeout(() => {
                mainText.innerText = segment.text;
                choiceButtons.innerHTML = '';
                segment.choices.forEach(c => {
                    const btn = document.createElement('button');
                    btn.className = 'btn';
                    btn.innerText = c.text;
                    btn.onclick = () => {
                        if (id.startsWith('end_') && c.next === 'start') { dushnost = 0; subjectivity = 0; }
                        else {
                            dushnost = Math.min(100, Math.max(0, dushnost + (c.d || 0)));
                            subjectivity = Math.min(100, Math.max(0, subjectivity + (c.s || 0)));
                        }
                        updateStats(); renderSegment(c.next);
                    };
                    choiceButtons.appendChild(btn);
                });
                screenContent.style.opacity = '1';
                screenContent.style.transform = 'translate3d(0, 0, 0)';
            }, 800);
        }

        function updateStats() {
            document.getElementById('stat-dushnost').innerText = dushnost;
            document.getElementById('stat-subjectivity').innerText = subjectivity;
        }

        window.onload = () => {
            renderSegment('start');
            initParticles();
            initBackgroundFog();
            animateFog();
            initOverlayFog();
        };

        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                initBackgroundFog();
                if (overlay.style.display !== 'none') initOverlayFog();
            }, 250);
        });
    </script>
</body>
